codemagic:
  workflows:
    android-workflow:
      name: Android Workflow
      max_build_duration: 120
      environment:
        vars:
          FLUTTER_VERSION: 3.16.0
          ANDROID_SDK_VERSION: 34
        android_signing:
          - keystore_reference
      triggering:
        events:
          - push
        branch_patterns:
          - pattern: main
            include: true
      scripts:
        - name: Install dependencies
          script: |
            flutter pub get
        - name: Run tests
          script: |
            flutter test
        - name: Build APK
          script: |
            flutter build apk --release
      artifacts:
        - build/app/outputs/apk/release/app-release.apk
      publishing:
        email:
          recipients:
            - build-notifications@example.com

    ios-workflow:
      name: iOS Workflow
      max_build_duration: 120
      environment:
        vars:
          FLUTTER_VERSION: 3.16.0
          XCODE_VERSION: 15.0
        xcode: latest
        cocoapods: default
      triggering:
        events:
          - push
        branch_patterns:
          - pattern: main
            include: true
      scripts:
        - name: Install dependencies
          script: |
            flutter pub get
        - name: Run tests
          script: |
            flutter test
        - name: Build iOS
          script: |
            flutter build ios --release --no-codesign
      artifacts:
        - build/ios/iphoneos/Runner.app
      publishing:
        email:
          recipients:
            - build-notifications@example.com
